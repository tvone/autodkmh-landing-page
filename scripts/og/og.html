<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body { font-family:'Be Vietnam Pro','Segoe UI',system-ui,sans-serif; background:#0a0a12; -webkit-font-smoothing:antialiased; }
  .card { position:relative; width:1200px; height:630px; overflow:hidden; background:#0a0a12; }

  /* aurora */
  .glow { position:absolute; border-radius:50%; }
  .g1 { width:780px; height:700px; right:-160px; top:-260px; background:radial-gradient(circle, rgba(34,211,238,0.60), transparent 62%); filter:blur(40px); }
  .g2 { width:600px; height:560px; right:-60px; bottom:-200px; background:radial-gradient(circle, rgba(56,189,248,0.50), transparent 62%); filter:blur(40px); }
  .g3 { width:560px; height:520px; left:-200px; top:-160px; background:radial-gradient(circle, rgba(99,102,241,0.42), transparent 64%); filter:blur(50px); }
  .g4 { width:440px; height:400px; left:30%; bottom:-200px; background:radial-gradient(circle, rgba(255,61,127,0.26), transparent 64%); filter:blur(60px); }
  .vignette { position:absolute; inset:0; background:radial-gradient(120% 120% at 46% 42%, transparent 55%, rgba(5,5,10,0.55) 100%); }

  .wrap { position:relative; z-index:3; height:100%; display:flex; flex-direction:column; padding:60px 64px; }
  .brand { display:flex; align-items:center; gap:13px; }
  .brand b { color:#fff; font-size:27px; font-weight:700; letter-spacing:-0.3px; }

  .mid { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .eyebrow { display:inline-flex; align-items:center; gap:9px; width:fit-content; padding:8px 16px; margin-bottom:22px;
             border:1px solid rgba(34,211,238,0.34); background:rgba(34,211,238,0.09); border-radius:999px;
             color:#7fe6f5; font-size:15px; font-weight:600; letter-spacing:0.4px; }
  .eyebrow .pulse { width:9px; height:9px; border-radius:50%; background:#22d3ee; box-shadow:0 0 10px #22d3ee; }
  h1 { max-width:660px; color:#fff; font-size:62px; font-weight:800; line-height:1.14; letter-spacing:-1.5px; }
  h1 .accent { background:linear-gradient(100deg,#5ef0ff 0%,#22d3ee 55%,#38bdf8 100%); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { margin-top:24px; color:#aeaec6; font-size:23px; font-weight:500; line-height:1.4; white-space:nowrap; }
  .proof { margin-top:26px; display:flex; align-items:center; gap:15px; font-size:24px; font-weight:600; color:#fff; }
  .proof .stars { color:#22d3ee; letter-spacing:3px; font-size:22px; }
  .proof .dot { color:#4a4a5e; }
  .proof .free { color:#38bdf8; }

  .url { color:#8585a0; font-size:21px; font-weight:700; letter-spacing:0.2px; }

  /* glass cards */
  .chip { position:absolute; z-index:4; display:flex; align-items:center; gap:15px; width:382px; padding:17px 19px;
          background:rgba(20,22,38,0.55); border:1px solid rgba(255,255,255,0.13); border-radius:19px;
          backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
          box-shadow:0 26px 64px rgba(0,0,0,0.55), inset 0 1px rgba(255,255,255,0.10); }
  .ic { flex-shrink:0; width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center; }
  .ic svg { width:23px; height:23px; }
  .ic.green { background:rgba(45,212,191,0.18); color:#2dd4bf; }
  .ic.sky { background:rgba(56,189,248,0.18); color:#38bdf8; }
  .ic.cyan { background:rgba(34,211,238,0.18); color:#22d3ee; }
  .ct .t1 { color:#fff; font-size:20px; font-weight:700; }
  .ct .t2 { margin-top:3px; color:#9292a8; font-size:15px; font-weight:500; }

  .chip.prog { flex-direction:column; align-items:stretch; gap:13px; width:410px; }
  .prog .row { display:flex; align-items:center; justify-content:space-between; }
  .prog .row .lhs { display:flex; align-items:center; gap:11px; }
  .prog .row .lhs .ic { width:38px; height:38px; border-radius:11px; }
  .prog .row .lhs b { color:#fff; font-size:20px; font-weight:700; }
  .prog .row .cnt { color:#22d3ee; font-size:17px; font-weight:700; }
  .bar { height:13px; border-radius:999px; background:rgba(255,255,255,0.12); overflow:hidden; }
  .bar > i { display:block; height:100%; width:100%; border-radius:999px; background:linear-gradient(90deg,#22d3ee,#38bdf8); box-shadow:0 0 14px rgba(34,211,238,0.6); }
</style>
</head>
<body>
  <div class="card">
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
    <div class="glow g4"></div>
    <div class="vignette"></div>

    <!-- floating glass cards -->
    <div class="chip" style="top:120px; right:58px;">
      <div class="ic green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
      <div class="ct"><div class="t1">Toán rời rạc</div><div class="t2">Đã đăng ký · P.402 · 13h00</div></div>
    </div>
    <div class="chip" style="top:234px; right:26px;">
      <div class="ic sky"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
      <div class="ct"><div class="t1">Cơ sở dữ liệu</div><div class="t2">Đã đăng ký · P.210 · 07h00</div></div>
    </div>
    <div class="chip prog" style="top:352px; right:58px;">
      <div class="row">
        <div class="lhs">
          <div class="ic cyan"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4.1 13a1 1 0 0 0 .78 1.62H10l-1 7.38 8.9-11.99A1 1 0 0 0 16.1 9.4H11l2-7.4z"/></svg></div>
          <b>Đăng ký hàng loạt</b>
        </div>
        <div class="cnt">5/5 môn</div>
      </div>
      <div class="bar"><i></i></div>
    </div>

    <div class="wrap">
      <div class="brand">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <path d="M40 14 A18 18 0 1 0 40 38" stroke="#29e0e0" stroke-width="6.5" stroke-linecap="round"/>
          <path d="M43.5 17.5 A18 18 0 1 0 43.5 41.5" stroke="#ff2f6b" stroke-width="6.5" stroke-linecap="round" opacity="0.92"/>
        </svg>
        <b>Auto ĐKMH</b>
      </div>

      <div class="mid">
        <div class="eyebrow"><span class="pulse"></span>TIỆN ÍCH CHROME CHO SINH VIÊN</div>
        <h1>Đăng ký môn học<br><span class="accent">tự động hoàn toàn.</span></h1>
        <p class="sub">Giải CAPTCHA · Canh giờ mở cổng · Đăng ký hàng loạt</p>
        <div class="proof"><span class="stars">★★★★★</span><b>5.0</b><span class="dot">·</span><b>1.000+ sinh viên</b><span class="dot">·</span><span class="free">Miễn phí</span></div>
      </div>

      <div class="url">autodkmh.vercel.app</div>
    </div>
  </div>
</body>
</html>
